name: Release portable Windows build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.2.0)'
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo registry / target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: npm ci

      - name: Build portable exe (no installer bundling)
        run: npm run tauri -- build --no-bundle --target x86_64-pc-windows-msvc

      - name: Stage release asset
        id: stage
        shell: pwsh
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          $src = "src-tauri/target/x86_64-pc-windows-msvc/release/fflag-check.exe"
          if (!(Test-Path $src)) { throw "Expected build output not found: $src" }

          if ($env:EVENT_NAME -eq "push") {
            $tag = $env:REF_NAME
          } else {
            $tag = $env:INPUT_TAG
          }

          if ($tag -notmatch '^[A-Za-z0-9._-]+$') {
            throw "Refusing unsafe tag value: $tag"
          }

          $dest = "TSBCC-FFlag-Scanner-$tag-portable.exe"
          Copy-Item $src $dest

          "asset=$dest" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "tag=$tag"    | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.stage.outputs.asset }}
          path: ${{ steps.stage.outputs.asset }}
          if-no-files-found: error

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.stage.outputs.tag }}
          name: ${{ steps.stage.outputs.tag }}
          files: ${{ steps.stage.outputs.asset }}
          draft: false
          prerelease: false
          generate_release_notes: true
